<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sound Enhance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="app">
  <div class="panel">

    <!-- ── TOPBAR ── -->
    <header class="header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 20 14" fill="none" aria-hidden="true">
          <rect x="0"   y="7"  width="3" height="7"  rx="1" fill="var(--acc)"/>
          <rect x="4.5" y="3"  width="3" height="11" rx="1" fill="var(--acc)"/>
          <rect x="9"   y="0"  width="3" height="14" rx="1" fill="var(--acc)"/>
          <rect x="13.5" y="4" width="3" height="10" rx="1" fill="var(--acc)"/>
          <rect x="17"  y="6"  width="3" height="8"  rx="1" fill="var(--acc)"/>
        </svg>
        <span class="brand-text"><b>SOUND</b>ENHANCE</span>
      </div>
      <div class="header-right">
        <div class="site-badge" id="siteBadge">—</div>
        <button class="update-btn" id="updateBtn" title="アップデートを確認" aria-label="アップデートを確認">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 4.5A6 6 0 1 0 14 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <path d="M13.5 1.5v3.3h-3.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          <span class="update-dot" id="updateDot" hidden></span>
        </button>
      </div>
    </header>

    <!-- ── UPDATE PANEL ── -->
    <section class="update-panel" id="updatePanel">
      <div class="update-panel-row">
        <span class="update-status-icon" id="updateStatusIcon" aria-hidden="true"></span>
        <span class="update-status" id="updateStatus">確認中…</span>
      </div>
      <div class="update-panel-actions" id="updateActions">
        <button class="update-download-btn" id="updateDownloadBtn">ZIPをダウンロード</button>
      </div>
    </section>

    <!-- ── MAIN 2-COLUMN GRID ── -->
    <div class="main-grid">

      <!-- LEFT: Gain + Intensity -->
      <div class="col-left">

        <!-- GAIN -->
        <div class="gain-section">
          <div class="section-head">
            <span class="section-label">GAIN</span>
            <span class="gain-readout" id="gainReadout">
              <span id="volumeDisplay">100</span><span class="unit">%</span>
            </span>
          </div>
          <div class="meter-wrap">
            <input type="range" id="volumeSlider" class="slider-input"
                   min="0" max="1000" value="100" step="1"
                   aria-label="Gain percentage" />
            <div class="meter-track">
              <div class="meter-mask" id="meterMask"></div>
              <div class="meter-segments" id="meterSegments"></div>
              <div class="meter-handle" id="meterHandle"></div>
            </div>
          </div>
          <div class="meter-scale">
            <span>0</span><span>100</span><span>500</span><span>1000%</span>
          </div>
        </div>

        <!-- INTENSITY -->
        <div class="intensity-section">
          <div class="section-head">
            <span class="section-label">EFFECT INTENSITY</span>
            <span class="gain-readout" id="intensityReadout">
              <span id="intensityDisplay">1.00</span><span class="unit">x</span>
            </span>
          </div>
          <div class="meter-wrap">
            <input type="range" id="intensitySlider" class="slider-input"
                   min="0" max="600" value="100" step="1"
                   aria-label="Effect intensity" />
            <div class="meter-track intensity-track">
              <div class="meter-mask" id="intensityMask"></div>
              <div class="meter-handle" id="intensityHandle"></div>
            </div>
          </div>
          <div class="meter-scale">
            <span>0x</span><span>1x</span><span>3x</span><span>6x</span>
          </div>
        </div>

        <!-- OPTIONS (左カラム下部) -->
        <div class="options-section">
          <span class="section-label">OPTIONS</span>
          <div class="option-row">
            <div class="option-copy">
              <span class="option-title">Bypass</span>
              <span class="option-hint">pass-through, preset kept</span>
            </div>
            <label class="toggle">
              <input type="checkbox" id="bypassToggle" />
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
          </div>
          <div class="option-row">
            <div class="option-copy">
              <span class="option-title">Toolbar badge</span>
              <span class="option-hint">show gain % on icon</span>
            </div>
            <label class="toggle">
              <input type="checkbox" id="badgeToggle" />
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
          </div>
        </div>

      </div><!-- /col-left -->

      <!-- RIGHT: Effects -->
      <div class="col-right">
        <div class="effects-section">
          <span class="section-label">SIGNAL CHAIN</span>
          <div class="effects-grid" id="effectsGrid">

            <button class="effect-btn active" data-effect="none">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M2 8h12M8 2v12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
                  <circle cx="8" cy="8" r="2" fill="currentColor"/>
                </svg>
              </div>
              <span>Flat</span>
            </button>

            <button class="effect-btn" data-effect="3d">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <ellipse cx="8" cy="8" rx="6" ry="3" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M2 8c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6-6-2.7-6-6z" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M8 2v12" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 1.5"/>
                </svg>
              </div>
              <span>3D</span>
            </button>

            <button class="effect-btn" data-effect="8d">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M8 1L8 15M1 8L15 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                  <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
                  <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
                </svg>
              </div>
              <span>8D</span>
            </button>

            <button class="effect-btn" data-effect="16d">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                  <circle cx="8" cy="8" r="4" stroke="currentColor" stroke-width="1" stroke-dasharray="1.5 1.5"/>
                  <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1" stroke-dasharray="1 2"/>
                </svg>
              </div>
              <span>16D</span>
            </button>

            <button class="effect-btn" data-effect="live">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M3 8Q4 4 5 8Q6 12 7 8Q8 4 9 8Q10 12 11 8Q12 4 13 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
                </svg>
              </div>
              <span>Live</span>
            </button>

            <button class="effect-btn" data-effect="bass">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M2 11Q4 5 6 10Q8 15 10 10Q12 5 14 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                  <path d="M2 8Q8 2 14 8" stroke="currentColor" stroke-width="1" opacity="0.3" stroke-linecap="round" fill="none"/>
                </svg>
              </div>
              <span>Bass↑</span>
            </button>

            <button class="effect-btn" data-effect="reverb">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M5 3v10M8 5v6M11 3v10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                  <path d="M12 7L12 9M3 7L3 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
                </svg>
              </div>
              <span>Reverb</span>
            </button>

            <button class="effect-btn" data-effect="night">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M13 8.5A5.5 5.5 0 1 1 7.5 3c.5 0 1 .06 1.46.18A4 4 0 0 0 13 8.5z" stroke="currentColor" stroke-width="1.3" fill="none"/>
                </svg>
              </div>
              <span>Night</span>
            </button>

            <button class="effect-btn" data-effect="water">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M2 10Q4 7 6 10Q8 13 10 10Q12 7 14 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                  <path d="M2 7Q4 4 6 7Q8 10 10 7Q12 4 14 7" stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.45"/>
                </svg>
              </div>
              <span>Water</span>
            </button>

            <button class="effect-btn" data-effect="mono">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="4" stroke="currentColor" stroke-width="1.3"/>
                  <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                </svg>
              </div>
              <span>Mono</span>
            </button>

            <button class="effect-btn" data-effect="vocal">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M8 2a2.5 2.5 0 0 1 2.5 2.5v3a2.5 2.5 0 0 1-5 0v-3A2.5 2.5 0 0 1 8 2z" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M4.5 7.5a3.5 3.5 0 0 0 7 0M8 11v3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
              </div>
              <span>Vocal</span>
            </button>

            <button class="effect-btn" data-effect="loud">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M2 6h2.5L8 3v10L4.5 10H2V6z" fill="currentColor"/>
                  <path d="M10.5 5.5a4 4 0 0 1 0 5M12.5 3.5a7 7 0 0 1 0 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
              </div>
              <span>Boost+</span>
            </button>

            <button class="effect-btn" data-effect="outdoor">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="6" r="2.6" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M8 1.5v1M8 9.5v1M3 6h1M12 6h1M4.6 2.6l.7.7M10.7 2.6l-.7.7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
                  <path d="M1.5 13.5Q5 10 8 13Q11 10 14.5 13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
                </svg>
              </div>
              <span>Outdoor</span>
            </button>

            <button class="effect-btn" data-effect="stadium">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <ellipse cx="8" cy="8" rx="7" ry="4.2" stroke="currentColor" stroke-width="1.1"/>
                  <ellipse cx="8" cy="8" rx="4.3" ry="2.4" stroke="currentColor" stroke-width="1"/>
                  <ellipse cx="8" cy="8" rx="1.6" ry="0.9" fill="currentColor"/>
                </svg>
              </div>
              <span>Stadium</span>
            </button>

            <button class="effect-btn" data-effect="call">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M3.2 3.4c.3-.7.9-1.1 1.6-1 .6.1 1.1.6 1.3 1.2l.5 1.5c.2.5 0 1.1-.4 1.5l-.8.8c.5 1.2 1.4 2.1 2.6 2.6l.8-.8c.4-.4 1-.5 1.5-.4l1.5.5c.6.2 1 .7 1.2 1.3.1.7-.3 1.3-1 1.6-3 1.2-6.6-.4-8.5-2.3S2 6.4 3.2 3.4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
              </div>
              <span>Call</span>
            </button>

            <button class="effect-btn" data-effect="lofi">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <rect x="1.5" y="3.5" width="13" height="9" rx="1.3" stroke="currentColor" stroke-width="1.2"/>
                  <circle cx="5.5" cy="8" r="1.5" stroke="currentColor" stroke-width="1.1"/>
                  <circle cx="10.5" cy="8" r="1.5" stroke="currentColor" stroke-width="1.1"/>
                  <path d="M5.5 8h5" stroke="currentColor" stroke-width="0.9" opacity="0.5"/>
                </svg>
              </div>
              <span>Lo-Fi</span>
            </button>

            <button class="effect-btn" data-effect="vacuum">
              <span class="effect-led"></span>
              <div class="effect-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="7.5" cy="7.5" r="2.6" stroke="currentColor" stroke-width="1.2"/>
                  <ellipse cx="7.5" cy="7.5" rx="6.6" ry="2.1" stroke="currentColor" stroke-width="1" opacity="0.5" transform="rotate(-18 7.5 7.5)"/>
                  <circle cx="2" cy="2.6" r="0.6" fill="currentColor" opacity="0.7"/>
                  <circle cx="13.6" cy="2.2" r="0.5" fill="currentColor" opacity="0.5"/>
                </svg>
              </div>
              <span>Vacuum</span>
            </button>

          </div><!-- /effects-grid -->
        </div><!-- /effects-section -->
      </div><!-- /col-right -->

    </div><!-- /main-grid -->

    <!-- ── FOOTER ── -->
    <footer class="footer">
      <button class="reset-btn" id="resetBtn">Reset site</button>
      <div class="power-led-wrap">
        <span class="power-label">ACTIVE</span>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </footer>

  </div><!-- /panel -->
</div><!-- /app -->
<script src="popup.js"></script>
</body>
</html>
